<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gato Gordo</title>
  
  <!-- Ícone SVG do gato gordo (favicon + Apple touch icon) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23F97316'/%3E%3Cpath d='M25 30 L35 15 L45 30' fill='%23F97316' stroke='%23fff' stroke-width='3'/%3E%3Cpath d='M55 30 L65 15 L75 30' fill='%23F97316' stroke='%23fff' stroke-width='3'/%3E%3Ccircle cx='35' cy='45' r='8' fill='%23fff'/%3E%3Ccircle cx='65' cy='45' r='8' fill='%23fff'/%3E%3Ccircle cx='35' cy='45' r='4' fill='%23000'/%3E%3Ccircle cx='65' cy='45' r='4' fill='%23000'/%3E%3Cellipse cx='50' cy='65' rx='12' ry='8' fill='%23fff'/%3E%3Ctext x='50' y='85' text-anchor='middle' font-size='28' font-weight='bold' fill='%23FBBF24'%3E$%3C/text%3E%3Cpath d='M20 55 Q30 70 50 70 Q70 70 80 55' fill='none' stroke='%23fff' stroke-width='3'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23F97316'/%3E%3Cpath d='M25 30 L35 15 L45 30' fill='%23F97316' stroke='%23fff' stroke-width='3'/%3E%3Cpath d='M55 30 L65 15 L75 30' fill='%23F97316' stroke='%23fff' stroke-width='3'/%3E%3Ccircle cx='35' cy='45' r='8' fill='%23fff'/%3E%3Ccircle cx='65' cy='45' r='8' fill='%23fff'/%3E%3Ccircle cx='35' cy='45' r='4' fill='%23000'/%3E%3Ccircle cx='65' cy='45' r='4' fill='%23000'/%3E%3Cellipse cx='50' cy='65' rx='12' ry='8' fill='%23fff'/%3E%3Ctext x='50' y='85' text-anchor='middle' font-size='28' font-weight='bold' fill='%23FBBF24'%3E$%3C/text%3E%3Cpath d='M20 55 Q30 70 50 70 Q70 70 80 55' fill='none' stroke='%23fff' stroke-width='3'/%3E%3C/svg%3E">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body {
      background: radial-gradient(circle at 20% 20%, #1e293b, #0f172a);
      min-height: 100vh;
    }
    .glass {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:active { transform: scale(0.98); }
    .tab-btn { transition: all 0.2s; }
    .tab-active {
      color: #F97316;
      border-bottom: 2px solid #F97316;
    }
    .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    input, select, textarea {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: #fff !important;
      transition: border 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #F97316 !important;
      outline: none;
      box-shadow: 0 0 0 2px rgba(249,115,22,0.3);
    }
    button:active { transform: scale(0.96); }
    .slide-in { animation: slideUp 0.3s ease; }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .badge-recorrente {
      background: rgba(251,191,36,0.15);
      color: #FBBF24;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .vencimento-proximo { border-left: 3px solid #EF4444; }
    .modal-scroll { max-height: 70vh; overflow-y: auto; }
  </style>
</head>
<body class="text-white pb-24">

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-20 glass px-5 py-4 flex items-center justify-between shadow-lg">
    <div class="flex items-center gap-3">
      <svg width="36" height="36" viewBox="0 0 100 100" class="drop-shadow-md">
        <circle cx="50" cy="50" r="48" fill="#F97316"/>
        <path d="M25 30 L35 15 L45 30" fill="#F97316" stroke="#fff" stroke-width="3"/>
        <path d="M55 30 L65 15 L75 30" fill="#F97316" stroke="#fff" stroke-width="3"/>
        <circle cx="35" cy="45" r="8" fill="#fff"/>
        <circle cx="65" cy="45" r="8" fill="#fff"/>
        <circle cx="35" cy="45" r="4" fill="#000"/>
        <circle cx="65" cy="45" r="4" fill="#000"/>
        <ellipse cx="50" cy="65" rx="12" ry="8" fill="#fff"/>
        <text x="50" y="85" text-anchor="middle" font-size="28" font-weight="bold" fill="#FBBF24">$</text>
        <path d="M20 55 Q30 70 50 70 Q70 70 80 55" fill="none" stroke="#fff" stroke-width="3"/>
      </svg>
      <h1 class="text-2xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">Gato Gordo</h1>
    </div>
    <span class="text-xs text-gray-400">Finanças</span>
  </header>

  <!-- Conteúdo -->
  <main class="mt-20 px-4 max-w-lg mx-auto pb-6">
    
    <!-- Aba Pessoal -->
    <div id="tab-pessoal" class="tab-content slide-in space-y-6">
      <!-- Resumo mensal pessoal -->
      <div class="glass rounded-2xl p-5">
        <p class="text-gray-400 text-sm mb-3">📅 Resumo de <span id="mes-atual-pessoal"></span></p>
        <div class="grid grid-cols-3 gap-3 text-center">
          <div>
            <p class="text-xs text-gray-500">Receitas</p>
            <p id="resumo-receitas-mes" class="text-lg font-bold text-green-400">R$ 0,00</p>
          </div>
          <div>
            <p class="text-xs text-gray-500">Despesas</p>
            <p id="resumo-despesas-mes" class="text-lg font-bold text-red-400">R$ 0,00</p>
          </div>
          <div>
            <p class="text-xs text-gray-500">Saldo mês</p>
            <p id="resumo-saldo-mes" class="text-lg font-bold text-amber-400">R$ 0,00</p>
          </div>
        </div>
      </div>

      <!-- Patrimônio líquido (todas as contas) -->
      <div class="glass rounded-2xl p-5">
        <p class="text-gray-400 text-sm mb-1">💰 Patrimônio líquido</p>
        <p id="patrimonio-total" class="text-3xl font-bold text-amber-400">R$ 0,00</p>
      </div>

      <!-- Contas Bancárias -->
      <section>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold">🏦 Contas</h2>
          <button onclick="openModal('conta')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Nova</button>
        </div>
        <div id="lista-contas" class="space-y-3"></div>
      </section>

      <!-- Cartões de Crédito -->
      <section>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold">💳 Cartões</h2>
          <button onclick="openModal('cartao')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Novo</button>
        </div>
        <div id="lista-cartoes" class="space-y-3"></div>
      </section>

      <!-- Transações recentes -->
      <section>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold">📋 Transações</h2>
          <button onclick="openModal('transacao')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Nova</button>
        </div>
        <div id="lista-transacoes" class="space-y-3"></div>
      </section>
    </div>

    <!-- Aba Compartilhado -->
    <div id="tab-compartilhado" class="tab-content hidden slide-in space-y-6">
      <!-- Pessoas com total mensal -->
      <section>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold">👥 Participantes</h2>
          <button onclick="openModal('pessoa')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Nova</button>
        </div>
        <div id="lista-pessoas" class="space-y-3 mb-4"></div>
      </section>

      <!-- Contas a pagar -->
      <section>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold">📋 Contas a Pagar</h2>
          <button onclick="openModal('conta-compartilhada')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Nova</button>
        </div>
        <div id="lista-contas-compartilhadas" class="space-y-3"></div>
      </section>

      <!-- Resumo mensal compartilhado -->
      <div class="glass rounded-2xl p-5">
        <p class="text-gray-400 text-sm mb-3">📅 Total devido em <span id="mes-atual-compart"></span></p>
        <div id="resumo-mensal-compart" class="space-y-2"></div>
      </div>
    </div>
  </main>

  <!-- Barra inferior -->
  <nav class="fixed bottom-0 left-0 right-0 glass z-20 flex justify-around py-4 shadow-2xl border-t border-white/5">
    <button id="btn-pessoal" class="tab-active tab-btn flex flex-col items-center text-xs font-semibold" onclick="switchTab('pessoal')">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Pessoal
    </button>
    <button id="btn-compartilhado" class="tab-btn flex flex-col items-center text-xs font-semibold text-gray-400" onclick="switchTab('compartilhado')">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      Compartilhado
    </button>
  </nav>

  <!-- Modal genérico -->
  <div id="modal" class="fixed inset-0 z-30 flex items-center justify-center p-4 hidden">
    <div class="modal-overlay absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="glass rounded-2xl p-5 w-full max-w-sm relative z-10 slide-in shadow-2xl border border-white/10 modal-scroll">
      <button onclick="closeModal()" class="absolute top-3 right-3 text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

<script>
  (function() {
    // ========== ESTADO ==========
    const STORAGE_PESSOAL = 'gatogordo_pessoal_v3';
    const STORAGE_COMPART = 'gatogordo_compart_v3';

    let dadosPessoal = { contas: [], cartoes: [], transacoes: [] };
    let dadosCompart = { pessoas: [], contas: [] };

    function carregar() {
      try {
        const p = localStorage.getItem(STORAGE_PESSOAL);
        if (p) dadosPessoal = JSON.parse(p);
        const c = localStorage.getItem(STORAGE_COMPART);
        if (c) dadosCompart = JSON.parse(c);
      } catch(e) {}
    }
    function salvarPessoal() { localStorage.setItem(STORAGE_PESSOAL, JSON.stringify(dadosPessoal)); }
    function salvarCompart() { localStorage.setItem(STORAGE_COMPART, JSON.stringify(dadosCompart)); }

    const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
    const dt = (iso) => iso ? new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'short' }) : '';
    const hoje = new Date();
    const mesAtual = hoje.getMonth();
    const anoAtual = hoje.getFullYear();
    const nomeMes = hoje.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
    document.getElementById('mes-atual-pessoal').textContent = nomeMes;
    document.getElementById('mes-atual-compart').textContent = nomeMes;

    // ========== SALDO CONTA ==========
    function saldoConta(contaId) {
      let saldo = 0;
      const conta = dadosPessoal.contas.find(c => c.id === contaId);
      if (!conta) return 0;
      saldo = conta.saldoInicial || 0;
      dadosPessoal.transacoes.forEach(t => {
        if (t.tipo === 'receita' && t.contaId === contaId) saldo += t.valor;
        if (t.tipo === 'despesa' && t.contaId === contaId) saldo -= t.valor;
        if (t.tipo === 'transferencia') {
          if (t.contaId === contaId) saldo -= t.valor;
          if (t.contaDestinoId === contaId) saldo += t.valor;
        }
      });
      return saldo;
    }

    // ========== RESUMO MENSAL PESSOAL ==========
    function resumoMensalPessoal() {
      let receitas = 0, despesas = 0;
      dadosPessoal.transacoes.forEach(t => {
        const d = new Date(t.data);
        if (d.getMonth() === mesAtual && d.getFullYear() === anoAtual) {
          if (t.tipo === 'receita') receitas += t.valor;
          else if (t.tipo === 'despesa') despesas += t.valor;
        }
      });
      return { receitas, despesas, saldo: receitas - despesas };
    }

    // ========== ABAS ==========
    window.switchTab = function(tab) {
      document.getElementById('tab-pessoal').classList.toggle('hidden', tab !== 'pessoal');
      document.getElementById('tab-compartilhado').classList.toggle('hidden', tab !== 'compartilhado');
      const btnP = document.getElementById('btn-pessoal');
      const btnC = document.getElementById('btn-compartilhado');
      btnP.classList.toggle('tab-active', tab === 'pessoal');
      btnP.classList.toggle('text-gray-400', tab !== 'pessoal');
      btnC.classList.toggle('tab-active', tab === 'compartilhado');
      btnC.classList.toggle('text-gray-400', tab !== 'compartilhado');
      if (tab === 'compartilhado') renderCompart();
      if (tab === 'pessoal') renderPessoal();
    };

    // ========== MODAL ==========
    window.openModal = function(tipo, editIndex = null) {
      const modal = document.getElementById('modal');
      const content = document.getElementById('modal-content');
      modal.classList.remove('hidden');
      if (tipo === 'conta') formConta(content, editIndex);
      else if (tipo === 'cartao') formCartao(content, editIndex);
      else if (tipo === 'pessoa') formPessoa(content, editIndex);
      else if (tipo === 'conta-compartilhada') formContaCompart(content, editIndex);
      else if (tipo === 'transacao') formTransacao(content, editIndex);
    };
    window.closeModal = function() {
      document.getElementById('modal').classList.add('hidden');
    };

    // ========== FORMULÁRIOS ==========
    function formConta(container, idx) {
      const c = idx !== null ? dadosPessoal.contas[idx] : { id: Date.now(), nome:'', tipo:'corrente', saldoInicial:0 };
      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-4">${idx!==null?'Editar':'Nova'} Conta</h3>
        <input id="c-nome" placeholder="Nome do banco" value="${c.nome}" class="w-full p-3 rounded-xl mb-3">
        <select id="c-tipo" class="w-full p-3 rounded-xl mb-3">
          <option value="corrente" ${c.tipo==='corrente'?'selected':''}>Conta Corrente</option>
          <option value="poupanca" ${c.tipo==='poupanca'?'selected':''}>Poupança</option>
          <option value="carteira" ${c.tipo==='carteira'?'selected':''}>Carteira</option>
        </select>
        <input id="c-saldo-inicial" type="number" step="0.01" placeholder="Saldo inicial" value="${c.saldoInicial||0}" class="w-full p-3 rounded-xl mb-4">
        <button onclick="salvarConta(${idx!==null?idx:-1}, ${c.id})" class="w-full bg-amber-500 text-black font-semibold py-3 rounded-xl">Salvar</button>
      `;
    }
    window.salvarConta = function(idx, id) {
      const nome = document.getElementById('c-nome').value.trim();
      const tipo = document.getElementById('c-tipo').value;
      const saldoInicial = parseFloat(document.getElementById('c-saldo-inicial').value)||0;
      if (!nome) return alert('Preencha o nome');
      const obj = { id, nome, tipo, saldoInicial };
      if (idx === -1) dadosPessoal.contas.push(obj);
      else dadosPessoal.contas[idx] = obj;
      salvarPessoal(); closeModal(); renderPessoal();
    };

    function formCartao(container, idx) {
      const c = idx !== null ? dadosPessoal.cartoes[idx] : { nome:'', limite:0, utilizado:0, fechamento:'', obs:'' };
      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-4">${idx!==null?'Editar':'Novo'} Cartão</h3>
        <input id="cart-nome" placeholder="Nome do cartão" value="${c.nome}" class="w-full p-3 rounded-xl mb-3">
        <input id="cart-limite" type="number" step="0.01" placeholder="Limite total" value="${c.limite}" class="w-full p-3 rounded-xl mb-3">
        <input id="cart-utilizado" type="number" step="0.01" placeholder="Fatura atual" value="${c.utilizado}" class="w-full p-3 rounded-xl mb-3">
        <label class="text-xs text-gray-400">Fechamento</label>
        <input id="cart-fechamento" type="date" value="${c.fechamento}" class="w-full p-3 rounded-xl mb-3">
        <textarea id="cart-obs" rows="2" placeholder="Observações" class="w-full p-3 rounded-xl mb-4">${c.obs||''}</textarea>
        <button onclick="salvarCartao(${idx!==null?idx:-1})" class="w-full bg-amber-500 text-black font-semibold py-3 rounded-xl">Salvar</button>
      `;
    }
    window.salvarCartao = function(idx) {
      const nome = document.getElementById('cart-nome').value.trim();
      const limite = parseFloat(document.getElementById('cart-limite').value)||0;
      const utilizado = parseFloat(document.getElementById('cart-utilizado').value)||0;
      const fechamento = document.getElementById('cart-fechamento').value;
      const obs = document.getElementById('cart-obs').value;
      if (!nome) return alert('Preencha o nome');
      const obj = { nome, limite, utilizado, fechamento, obs };
      if (idx === -1) dadosPessoal.cartoes.push(obj);
      else dadosPessoal.cartoes[idx] = obj;
      salvarPessoal(); closeModal(); renderPessoal();
    };

    function formTransacao(container, idx) {
      const t = idx !== null ? dadosPessoal.transacoes[idx] : { id: Date.now(), descricao:'', valor:0, tipo:'despesa', contaId:null, contaDestinoId:null, data: hoje.toISOString().slice(0,10) };
      const contasOpt = dadosPessoal.contas.map(c => `<option value="${c.id}" ${t.contaId===c.id?'selected':''}>${c.nome}</option>`).join('');
      const contasDestOpt = dadosPessoal.contas.map(c => `<option value="${c.id}" ${t.contaDestinoId===c.id?'selected':''}>${c.nome}</option>`).join('');
      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-4">${idx!==null?'Editar':'Nova'} Transação</h3>
        <input id="t-desc" placeholder="Descrição" value="${t.descricao}" class="w-full p-3 rounded-xl mb-3">
        <input id="t-valor" type="number" step="0.01" placeholder="Valor" value="${t.valor}" class="w-full p-3 rounded-xl mb-3">
        <select id="t-tipo" class="w-full p-3 rounded-xl mb-3" onchange="transacaoTipoChange()">
          <option value="despesa" ${t.tipo==='despesa'?'selected':''}>Despesa</option>
          <option value="receita" ${t.tipo==='receita'?'selected':''}>Receita</option>
          <option value="transferencia" ${t.tipo==='transferencia'?'selected':''}>Transferência</option>
        </select>
        <div id="t-conta-group" class="mb-3">
          <select id="t-conta" class="w-full p-3 rounded-xl">${contasOpt}</select>
        </div>
        <div id="t-conta-destino-group" class="mb-4 ${t.tipo==='transferencia'?'':'hidden'}">
          <label class="text-xs text-gray-400">Conta destino</label>
          <select id="t-conta-destino" class="w-full p-3 rounded-xl">${contasDestOpt}</select>
        </div>
        <input id="t-data" type="date" value="${t.data}" class="w-full p-3 rounded-xl mb-4">
        <button onclick="salvarTransacao(${idx!==null?idx:-1}, ${t.id})" class="w-full bg-amber-500 text-black font-semibold py-3 rounded-xl">Salvar</button>
      `;
    }
    window.transacaoTipoChange = function() {
      const tipo = document.getElementById('t-tipo').value;
      document.getElementById('t-conta-destino-group').classList.toggle('hidden', tipo !== 'transferencia');
    };
    window.salvarTransacao = function(idx, id) {
      const descricao = document.getElementById('t-desc').value.trim();
      const valor = parseFloat(document.getElementById('t-valor').value)||0;
      const tipo = document.getElementById('t-tipo').value;
      const contaId = parseInt(document.getElementById('t-conta').value) || null;
      const contaDestinoId = tipo === 'transferencia' ? (parseInt(document.getElementById('t-conta-destino').value) || null) : null;
      const data = document.getElementById('t-data').value;
      if (!descricao || !valor || !contaId) return alert('Preencha os campos obrigatórios');
      if (tipo === 'transferencia' && !contaDestinoId) return alert('Selecione conta destino');
      const obj = { id, descricao, valor, tipo, contaId, contaDestinoId, data };
      if (idx === -1) dadosPessoal.transacoes.push(obj);
      else dadosPessoal.transacoes[idx] = obj;
      salvarPessoal(); closeModal(); renderPessoal();
    };

    function formPessoa(container, idx) {
      const p = idx !== null ? dadosCompart.pessoas[idx] : { nome:'', salario:0 };
      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-4">${idx!==null?'Editar':'Nova'} Pessoa</h3>
        <input id="p-nome" placeholder="Nome" value="${p.nome}" class="w-full p-3 rounded-xl mb-3">
        <input id="p-salario" type="number" step="0.01" placeholder="Salário" value="${p.salario}" class="w-full p-3 rounded-xl mb-4">
        <button onclick="salvarPessoa(${idx!==null?idx:-1})" class="w-full bg-amber-500 text-black font-semibold py-3 rounded-xl">Salvar</button>
      `;
    }
    window.salvarPessoa = function(idx) {
      const nome = document.getElementById('p-nome').value.trim();
      const salario = parseFloat(document.getElementById('p-salario').value)||0;
      if (!nome) return alert('Preencha o nome');
      const obj = { nome, salario };
      if (idx === -1) dadosCompart.pessoas.push(obj);
      else dadosCompart.pessoas[idx] = obj;
      salvarCompart(); closeModal(); renderCompart();
    };

    function formContaCompart(container, idx) {
      const conta = idx !== null ? dadosCompart.contas[idx] : null;
      const desc = conta ? conta.descricao : '';
      const valor = conta ? conta.valor : '';
      const vencimento = conta ? conta.vencimento : '';
      const recorrente = conta ? conta.recorrente : false;
      const frequencia = conta ? conta.frequencia : 'mensal';
      const participantes = conta ? conta.participantes : [];

      let checksHTML = '';
      dadosCompart.pessoas.forEach((p, i) => {
        const marcado = participantes.some(pt => pt.pessoaIdx === i);
        checksHTML += `<label class="flex items-center gap-2 mb-2"><input type="checkbox" class="pessoa-check" value="${i}" ${marcado?'checked':''}> ${p.nome}</label>`;
      });

      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-4">${idx!==null?'Editar':'Nova'} Conta</h3>
        <input id="cc-desc" placeholder="Descrição" value="${desc}" class="w-full p-3 rounded-xl mb-3">
        <input id="cc-valor" type="number" step="0.01" placeholder="Valor total" value="${valor}" class="w-full p-3 rounded-xl mb-3" oninput="calcularDivisaoAuto()">
        <label class="text-xs text-gray-400">Vencimento</label>
        <input id="cc-vencimento" type="date" value="${vencimento}" class="w-full p-3 rounded-xl mb-3">
        <div class="flex items-center gap-2 mb-3">
          <input type="checkbox" id="cc-recorrente" ${recorrente?'checked':''} onchange="calcularDivisaoAuto(); document.getElementById('cc-freq-group').classList.toggle('hidden',!this.checked)">
          <label class="text-sm">Recorrente</label>
        </div>
        <div id="cc-freq-group" class="mb-3 ${recorrente?'':'hidden'}">
          <select id="cc-frequencia" class="w-full p-3 rounded-xl" onchange="calcularDivisaoAuto()">
            <option value="semanal" ${frequencia==='semanal'?'selected':''}>Semanal</option>
            <option value="quinzenal" ${frequencia==='quinzenal'?'selected':''}>Quinzenal</option>
            <option value="mensal" ${frequencia==='mensal'?'selected':''}>Mensal</option>
          </select>
        </div>
        <div class="text-sm mb-2">Participantes:</div>
        <div id="cc-participantes" class="mb-3" onchange="calcularDivisaoAuto()">${checksHTML}</div>
        <div id="cc-valores-individuais" class="space-y-2 mb-4"></div>
        <button onclick="salvarContaCompart(${idx!==null?idx:-1})" class="w-full bg-amber-500 text-black font-semibold py-3 rounded-xl">Salvar</button>
      `;

      if (conta) {
        participantes.forEach(p => {
          const check = document.querySelector(`.pessoa-check[value="${p.pessoaIdx}"]`);
          if (check) check.checked = true;
        });
        atualizarCamposIndividuais(participantes);
      } else {
        calcularDivisaoAuto();
      }
    }

    window.calcularDivisaoAuto = function() {
      const checks = document.querySelectorAll('.pessoa-check:checked');
      const valorTotal = parseFloat(document.getElementById('cc-valor').value)||0;
      if (checks.length === 0 || valorTotal <= 0) {
        document.getElementById('cc-valores-individuais').innerHTML = '';
        return;
      }
      let somaSalarios = 0;
      const selecionados = [];
      checks.forEach(cb => {
        const idx = parseInt(cb.value);
        if (dadosCompart.pessoas[idx]) {
          selecionados.push({ idx, salario: dadosCompart.pessoas[idx].salario });
          somaSalarios += dadosCompart.pessoas[idx].salario;
        }
      });
      const valores = selecionados.map(s => ({
        pessoaIdx: s.idx,
        valor: somaSalarios > 0 ? (s.salario / somaSalarios) * valorTotal : 0
      }));
      atualizarCamposIndividuais(valores);
    };

    function atualizarCamposIndividuais(valores) {
      const container = document.getElementById('cc-valores-individuais');
      if (!container) return;
      container.innerHTML = valores.map(v => `
        <div class="flex items-center gap-2">
          <span class="text-xs w-20 truncate">${dadosCompart.pessoas[v.pessoaIdx]?.nome||''}</span>
          <input type="number" step="0.01" value="${v.valor.toFixed(2)}" data-pessoa="${v.pessoaIdx}" class="valor-individual w-full p-2 rounded-lg text-sm" oninput="calcularDivisaoAuto()">
        </div>
      `).join('');
    }

    window.salvarContaCompart = function(idx) {
      const desc = document.getElementById('cc-desc').value.trim();
      const valor = parseFloat(document.getElementById('cc-valor').value)||0;
      const vencimento = document.getElementById('cc-vencimento').value;
      const recorrente = document.getElementById('cc-recorrente').checked;
      const frequencia = recorrente ? document.getElementById('cc-frequencia').value : null;
      if (!desc) return alert('Preencha descrição');
      const participantes = [];
      document.querySelectorAll('.valor-individual').forEach(input => {
        const pessoaIdx = parseInt(input.dataset.pessoa);
        const valorPessoa = parseFloat(input.value)||0;
        participantes.push({ pessoaIdx, valor: valorPessoa });
      });
      const obj = { descricao: desc, valor, vencimento, recorrente, frequencia, participantes };
      if (idx === -1) dadosCompart.contas.push(obj);
      else dadosCompart.contas[idx] = obj;
      salvarCompart(); closeModal(); renderCompart();
    };

    // ========== RENDER ==========
    function renderPessoal() {
      // Resumo mensal
      const { receitas, despesas, saldo } = resumoMensalPessoal();
      document.getElementById('resumo-receitas-mes').textContent = fmt(receitas);
      document.getElementById('resumo-despesas-mes').textContent = fmt(despesas);
      document.getElementById('resumo-saldo-mes').textContent = fmt(saldo);

      // Patrimônio líquido (soma de todos os saldos)
      const totalPatrimonio = dadosPessoal.contas.reduce((s, c) => s + saldoConta(c.id), 0);
      document.getElementById('patrimonio-total').textContent = fmt(totalPatrimonio);

      // Contas
      const listaContas = document.getElementById('lista-contas');
      listaContas.innerHTML = dadosPessoal.contas.map((c, i) => `
        <div class="glass rounded-2xl p-4 flex justify-between items-center card-hover">
          <div>
            <p class="font-medium">${c.nome}</p>
            <p class="text-xs text-gray-400 capitalize">${c.tipo}</p>
          </div>
          <div class="flex items-center gap-3">
            <span class="font-semibold text-amber-400">${fmt(saldoConta(c.id))}</span>
            <button onclick="openModal('conta', ${i})" class="text-gray-400">✎</button>
            <button onclick="excluirConta(${i})" class="text-red-400">✕</button>
          </div>
        </div>
      `).join('') || '<p class="text-gray-500 text-center py-4">Nenhuma conta</p>';

      // Cartões
      const listaCartoes = document.getElementById('lista-cartoes');
      listaCartoes.innerHTML = dadosPessoal.cartoes.map((c, i) => {
        const pct = c.limite > 0 ? (c.utilizado / c.limite * 100) : 0;
        const cor = pct > 80 ? 'bg-red-500' : pct > 50 ? 'bg-yellow-500' : 'bg-emerald-500';
        return `
          <div class="glass rounded-2xl p-4 card-hover">
            <div class="flex justify-between items-start mb-2">
              <div><p class="font-medium">${c.nome}</p><p class="text-xs text-gray-400">Fecha ${c.fechamento?dt(c.fechamento):'n/d'}</p></div>
              <div class="flex gap-2">
                <button onclick="openModal('cartao', ${i})" class="text-gray-400">✎</button>
                <button onclick="excluirCartao(${i})" class="text-red-400">✕</button>
              </div>
            </div>
            <div class="flex justify-between text-sm mb-2">
              <span>Utilizado: <strong class="text-amber-400">${fmt(c.utilizado)}</strong></span>
              <span>Limite: ${fmt(c.limite)}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill ${cor}" style="width:${Math.min(pct,100)}%"></div></div>
            ${c.obs ? `<p class="text-xs text-gray-500 mt-2">📌 ${c.obs}</p>` : ''}
          </div>`;
      }).join('') || '<p class="text-gray-500 text-center py-4">Nenhum cartão</p>';

      // Transações (últimas 20, ordenadas por data decrescente)
      const transacoesOrdenadas = [...dadosPessoal.transacoes].sort((a,b) => new Date(b.data) - new Date(a.data)).slice(0, 20);
      const listaTransacoes = document.getElementById('lista-transacoes');
      listaTransacoes.innerHTML = transacoesOrdenadas.map((t, i) => {
        const sinal = t.tipo === 'receita' ? '+' : t.tipo === 'despesa' ? '-' : '↔';
        const corValor = t.tipo === 'receita' ? 'text-green-400' : t.tipo === 'despesa' ? 'text-red-400' : 'text-blue-400';
        const contaNome = dadosPessoal.contas.find(c => c.id === t.contaId)?.nome || '';
        const detalhe = t.tipo === 'transferencia' ? `${contaNome} → ${dadosPessoal.contas.find(c => c.id === t.contaDestinoId)?.nome || ''}` : contaNome;
        return `
          <div class="glass rounded-xl p-3 flex justify-between items-center card-hover">
            <div>
              <p class="font-medium text-sm">${t.descricao}</p>
              <p class="text-xs text-gray-500">${dt(t.data)} • ${detalhe}</p>
            </div>
            <div class="flex items-center gap-2">
              <span class="font-semibold ${corValor}">${sinal} ${fmt(t.valor)}</span>
              <button onclick="excluirTransacao(${t.id})" class="text-red-400 text-xs">✕</button>
            </div>
          </div>`;
      }).join('') || '<p class="text-gray-500 text-center py-4">Nenhuma transação</p>';
    }

    function renderCompart() {
      // Pessoas com total mensal
      const totaisPessoa = {};
      dadosCompart.pessoas.forEach(p => totaisPessoa[p.nome] = 0);
      dadosCompart.contas.forEach(conta => {
        const incluir = conta.recorrente || (conta.vencimento && new Date(conta.vencimento).getMonth() === mesAtual && new Date(conta.vencimento).getFullYear() === anoAtual);
        if (incluir) {
          conta.participantes.forEach(p => {
            const pessoa = dadosCompart.pessoas[p.pessoaIdx];
            if (pessoa) totaisPessoa[pessoa.nome] = (totaisPessoa[pessoa.nome] || 0) + p.valor;
          });
        }
      });

      const listaPessoas = document.getElementById('lista-pessoas');
      listaPessoas.innerHTML = dadosCompart.pessoas.map((p, i) => `
        <div class="glass rounded-xl p-3 flex justify-between items-center card-hover">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-400 font-bold text-xs">${p.nome.charAt(0)}</div>
            <div>
              <span class="font-medium">${p.nome}</span>
              <p class="text-xs text-gray-400">Salário: ${fmt(p.salario)}</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="text-right">
              <span class="text-amber-400 font-semibold text-sm">Devido no mês:</span>
              <p class="text-white font-bold">${fmt(totaisPessoa[p.nome] || 0)}</p>
            </div>
            <button onclick="openModal('pessoa', ${i})" class="text-gray-400">✎</button>
            <button onclick="excluirPessoa(${i})" class="text-red-400">✕</button>
          </div>
        </div>
      `).join('') || '<p class="text-gray-500 text-center py-4">Nenhuma pessoa</p>';

      // Contas compartilhadas
      const listaContas = document.getElementById('lista-contas-compartilhadas');
      listaContas.innerHTML = dadosCompart.contas.map((c, i) => {
        const detalhes = c.participantes.map(p => {
          const pessoa = dadosCompart.pessoas[p.pessoaIdx];
          return `<div class="flex justify-between text-xs"><span>${pessoa ? pessoa.nome : '?'}</span><span class="text-amber-400">${fmt(p.valor)}</span></div>`;
        }).join('');
        const vencAtrasado = c.vencimento && c.vencimento < hoje.toISOString().slice(0,10);
        const classeVenc = vencAtrasado ? 'vencimento-proximo' : '';
        const badge = c.recorrente ? `<span class="badge-recorrente">🔄 ${c.frequencia}</span>` : '';
        return `
          <div class="glass rounded-2xl p-4 ${classeVenc} card-hover">
            <div class="flex justify-between items-start">
              <div>
                <div class="flex items-center gap-2 mb-1"><p class="font-medium">${c.descricao}</p>${badge}</div>
                <p class="text-xs text-gray-400">Venc: ${c.vencimento ? dt(c.vencimento) : '—'} ${vencAtrasado ? '⚠️' : ''}</p>
              </div>
              <div class="flex gap-2">
                <button onclick="openModal('conta-compartilhada', ${i})" class="text-gray-400">✎</button>
                <button onclick="excluirContaCompart(${i})" class="text-red-400">✕</button>
              </div>
            </div>
            <p class="text-2xl font-bold text-amber-400 mt-2">${fmt(c.valor)}</p>
            <div class="mt-3 space-y-1">${detalhes}</div>
          </div>`;
      }).join('') || '<p class="text-gray-500 text-center py-4">Nenhuma conta</p>';

      // Resumo mensal compartilhado
      const resumoDiv = document.getElementById('resumo-mensal-compart');
      resumoDiv.innerHTML = Object.entries(totaisPessoa)
        .filter(([_, v]) => v > 0)
        .map(([nome, valor]) => `<div class="flex justify-between"><span>${nome}</span><span class="font-semibold">${fmt(valor)}</span></div>`)
        .join('') || '<p class="text-gray-500">Nenhum débito neste mês</p>';
    }

    // Exclusões
    window.excluirConta = (i) => { if(confirm('Excluir conta e transações associadas?')) { const id = dadosPessoal.contas[i].id; dadosPessoal.contas.splice(i,1); dadosPessoal.transacoes = dadosPessoal.transacoes.filter(t => t.contaId !== id && t.contaDestinoId !== id); salvarPessoal(); renderPessoal(); } };
    window.excluirCartao = (i) => { if(confirm('Excluir cartão?')) { dadosPessoal.cartoes.splice(i,1); salvarPessoal(); renderPessoal(); } };
    window.excluirTransacao = (id) => { if(confirm('Excluir transação?')) { dadosPessoal.transacoes = dadosPessoal.transacoes.filter(t => t.id !== id); salvarPessoal(); renderPessoal(); } };
    window.excluirPessoa = (i) => { if(confirm('Excluir pessoa e suas divisões?')) { dadosCompart.pessoas.splice(i,1); salvarCompart(); renderCompart(); } };
    window.excluirContaCompart = (i) => { if(confirm('Excluir conta?')) { dadosCompart.contas.splice(i,1); salvarCompart(); renderCompart(); } };

    // Init
    carregar();
    renderPessoal();
    window.switchTab('pessoal');
  })();
</script>
</body>
</html>
