<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gato Gordo</title>
  
  <!-- Ícone será gerado via canvas -->
  <link id="favicon" rel="icon" type="image/png" href="">
  <link id="apple-touch-icon" rel="apple-touch-icon" sizes="180x180" href="">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body {
      background: radial-gradient(circle at 30% 30%, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      background-attachment: fixed;
    }
    .glass {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .card-premium {
      background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.25s ease;
    }
    .card-premium:active { transform: scale(0.98); }
    .tab-btn { transition: all 0.2s; }
    .tab-active {
      color: #F97316;
      border-bottom: 2px solid #F97316;
      font-weight: 600;
    }
    .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    input, select, textarea {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: #fff !important;
      transition: all 0.2s;
      font-size: 0.875rem;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #F97316 !important;
      outline: none;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.25);
    }
    button:active { transform: scale(0.96); }
    .slide-in { animation: slideUp 0.35s ease; }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .badge-recorrente {
      background: rgba(251,191,36,0.2);
      color: #FBBF24;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .vencimento-proximo { border-left: 3px solid #EF4444; }
    .modal-content {
      max-height: 80vh;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    /* Ajuste de inputs de data */
    input[type="date"] {
      padding: 0.5rem !important;
      font-size: 0.8rem !important;
      color-scheme: dark;
    }
    .login-overlay {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="text-white">

  <!-- Tela de Login (sobrepõe tudo até autenticar) -->
  <div id="login-screen" class="fixed inset-0 z-50 login-overlay flex items-center justify-center p-4">
    <div class="glass rounded-2xl p-6 w-full max-w-sm text-center slide-in">
      <div class="flex justify-center mb-4">
        <svg width="60" height="60" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="#F97316"/>
          <path d="M25 30 L35 15 L45 30" fill="#F97316" stroke="#fff" stroke-width="3"/>
          <path d="M55 30 L65 15 L75 30" fill="#F97316" stroke="#fff" stroke-width="3"/>
          <circle cx="35" cy="45" r="8" fill="#fff"/>
          <circle cx="65" cy="45" r="8" fill="#fff"/>
          <circle cx="35" cy="45" r="4" fill="#000"/>
          <circle cx="65" cy="45" r="4" fill="#000"/>
          <ellipse cx="50" cy="65" rx="12" ry="8" fill="#fff"/>
          <text x="50" y="85" text-anchor="middle" font-size="28" font-weight="bold" fill="#FBBF24">$</text>
          <path d="M20 55 Q30 70 50 70 Q70 70 80 55" fill="none" stroke="#fff" stroke-width="3"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold mb-4">Gato Gordo</h2>
      <div id="login-perfis" class="space-y-2 mb-4"></div>
      <div id="login-senha-group" class="hidden mb-4">
        <input type="password" id="login-senha" placeholder="Senha do perfil" class="w-full p-3 rounded-xl text-sm">
        <p id="login-erro" class="text-red-400 text-xs mt-1 hidden">Senha incorreta</p>
      </div>
      <button id="btn-entrar" class="w-full bg-amber-500 text-black font-semibold py-3 rounded-xl mb-2 hidden" onclick="entrarPerfil()">Entrar</button>
      <button id="btn-novo-perfil" class="w-full bg-amber-500/20 text-amber-400 py-3 rounded-xl text-sm" onclick="criarPerfilLogin()">+ Criar novo perfil</button>
      <p id="login-msg" class="text-xs text-gray-400 mt-3">Seus dados ficam salvos apenas neste dispositivo.</p>
    </div>
  </div>

  <!-- App principal (oculto até login) -->
  <div id="app-container" class="hidden">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-20 glass px-5 py-4 flex items-center justify-between shadow-2xl">
      <div class="flex items-center gap-3">
        <svg width="36" height="36" viewBox="0 0 100 100" class="drop-shadow-lg">
          <circle cx="50" cy="50" r="48" fill="#F97316"/>
          <path d="M25 30 L35 15 L45 30" fill="#F97316" stroke="#fff" stroke-width="3"/>
          <path d="M55 30 L65 15 L75 30" fill="#F97316" stroke="#fff" stroke-width="3"/>
          <circle cx="35" cy="45" r="8" fill="#fff"/>
          <circle cx="65" cy="45" r="8" fill="#fff"/>
          <circle cx="35" cy="45" r="4" fill="#000"/>
          <circle cx="65" cy="45" r="4" fill="#000"/>
          <ellipse cx="50" cy="65" rx="12" ry="8" fill="#fff"/>
          <text x="50" y="85" text-anchor="middle" font-size="28" font-weight="bold" fill="#FBBF24">$</text>
          <path d="M20 55 Q30 70 50 70 Q70 70 80 55" fill="none" stroke="#fff" stroke-width="3"/>
        </svg>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">Gato Gordo</h1>
      </div>
      <button onclick="logout()" class="text-xs text-gray-400 hover:text-white">Sair</button>
    </header>

    <!-- Conteúdo -->
    <main class="mt-20 px-4 max-w-lg mx-auto pb-24">
      
      <!-- Aba Pessoal -->
      <div id="tab-pessoal" class="tab-content slide-in space-y-6">
        <!-- Navegação mensal -->
        <div class="flex items-center justify-between glass rounded-2xl p-3">
          <button onclick="mudarMes(-1)" class="text-amber-400 text-lg font-bold px-2">&lt;</button>
          <span id="mes-referencia-pessoal" class="font-semibold text-sm"></span>
          <button onclick="mudarMes(1)" class="text-amber-400 text-lg font-bold px-2">&gt;</button>
        </div>

        <!-- Resumo mensal -->
        <div class="glass rounded-2xl p-5">
          <p class="text-gray-400 text-sm mb-3">📅 Resumo de <span id="mes-atual-pessoal"></span></p>
          <div class="grid grid-cols-3 gap-3 text-center">
            <div><p class="text-xs text-gray-500">Receitas</p><p id="resumo-receitas-mes" class="text-lg font-bold text-green-400">R$ 0,00</p></div>
            <div><p class="text-xs text-gray-500">Despesas</p><p id="resumo-despesas-mes" class="text-lg font-bold text-red-400">R$ 0,00</p></div>
            <div><p class="text-xs text-gray-500">Saldo</p><p id="resumo-saldo-mes" class="text-lg font-bold text-amber-400">R$ 0,00</p></div>
          </div>
        </div>

        <!-- Patrimônio líquido -->
        <div class="glass rounded-2xl p-5">
          <p class="text-gray-400 text-sm mb-1">💰 Patrimônio líquido</p>
          <p id="patrimonio-total" class="text-3xl font-bold text-amber-400">R$ 0,00</p>
        </div>

        <!-- Contas Bancárias -->
        <section>
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">🏦 Contas</h2>
            <button onclick="openModal('conta')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Nova</button>
          </div>
          <div id="lista-contas" class="space-y-3"></div>
        </section>

        <!-- Cartões de Crédito -->
        <section>
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">💳 Cartões</h2>
            <button onclick="openModal('cartao')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Novo</button>
          </div>
          <div id="lista-cartoes" class="space-y-3"></div>
        </section>

        <!-- Transações gerais (opcional, mantida como resumo) -->
        <section>
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">📋 Últimas Transações</h2>
            <button onclick="openModal('transacao')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Nova</button>
          </div>
          <div id="lista-transacoes" class="space-y-2"></div>
        </section>
      </div>

      <!-- Aba Compartilhado -->
      <div id="tab-compartilhado" class="tab-content hidden slide-in space-y-6">
        <div class="flex items-center justify-between glass rounded-2xl p-3">
          <button onclick="mudarMesComp(-1)" class="text-amber-400 text-lg font-bold px-2">&lt;</button>
          <span id="mes-referencia-compart" class="font-semibold text-sm"></span>
          <button onclick="mudarMesComp(1)" class="text-amber-400 text-lg font-bold px-2">&gt;</button>
        </div>

        <section>
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">👥 Participantes</h2>
            <button onclick="openModal('pessoa')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Nova</button>
          </div>
          <div id="lista-pessoas" class="space-y-3 mb-4"></div>
        </section>

        <section>
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold">📋 Contas a Pagar</h2>
            <button onclick="openModal('conta-compartilhada')" class="bg-amber-500/10 text-amber-400 px-4 py-2 rounded-lg text-sm font-medium">+ Nova</button>
          </div>
          <div id="lista-contas-compartilhadas" class="space-y-3"></div>
        </section>

        <div class="glass rounded-2xl p-5">
          <p class="text-gray-400 text-sm mb-3">📅 Total devido em <span id="mes-atual-compart"></span></p>
          <div id="resumo-mensal-compart" class="space-y-2"></div>
        </div>
      </div>
    </main>

    <!-- Barra inferior -->
    <nav class="fixed bottom-0 left-0 right-0 glass z-20 flex justify-around py-4 shadow-2xl border-t border-white/5">
      <button id="btn-pessoal" class="tab-active tab-btn flex flex-col items-center text-xs font-semibold" onclick="switchTab('pessoal')">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Pessoal
      </button>
      <button id="btn-compartilhado" class="tab-btn flex flex-col items-center text-xs font-semibold text-gray-400" onclick="switchTab('compartilhado')">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Compartilhado
      </button>
    </nav>

    <!-- Modal principal -->
    <div id="modal" class="fixed inset-0 z-30 flex items-center justify-center p-4 hidden">
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
      <div class="glass rounded-2xl p-5 w-full max-w-sm relative z-10 slide-in shadow-2xl border border-white/10">
        <button onclick="closeModal()" class="absolute top-3 right-3 text-gray-400 hover:text-white text-2xl leading-none z-20">&times;</button>
        <div id="modal-content" class="modal-content"></div>
      </div>
    </div>
  </div>

<script>
  (function() {
    // ========== ESTADO GLOBAL ==========
    const STORAGE_PESSOAL = 'gatogordo_pessoal_v5';
    const STORAGE_COMPART = 'gatogordo_compart_v5';

    let dadosPessoal = { perfis: {} };  // { nome: { contas, cartoes, transacoes, senha } }
    let perfilAtivo = null;            // nome do perfil logado
    let dadosCompart = { pessoas: [], contas: [] };

    let mesRefPessoal = new Date().getMonth();
    let anoRefPessoal = new Date().getFullYear();
    let mesRefCompart = new Date().getMonth();
    let anoRefCompart = new Date().getFullYear();

    const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
    const dt = (iso) => iso ? new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'short' }) : '';
    const hoje = new Date();
    const nomeMesAno = (m, a) => new Date(a, m).toLocaleString('pt-BR', { month: 'long', year: 'numeric' });

    function carregarDados() {
      try {
        const p = localStorage.getItem(STORAGE_PESSOAL);
        if (p) dadosPessoal = JSON.parse(p);
        if (!dadosPessoal.perfis) dadosPessoal.perfis = {};
        const c = localStorage.getItem(STORAGE_COMPART);
        if (c) dadosCompart = JSON.parse(c);
      } catch(e) {}
    }
    function salvarPessoal() { localStorage.setItem(STORAGE_PESSOAL, JSON.stringify(dadosPessoal)); }
    function salvarCompart() { localStorage.setItem(STORAGE_COMPART, JSON.stringify(dadosCompart)); }

    function perfil() { return perfilAtivo ? dadosPessoal.perfis[perfilAtivo] : null; }

    // ========== ÍCONE ==========
    function gerarIcone() {
      const canvas = document.createElement('canvas');
      canvas.width = 180;
      canvas.height = 180;
      const ctx = canvas.getContext('2d');
      // Fundo transparente (ou círculo laranja)
      ctx.clearRect(0,0,180,180);
      // Círculo principal
      ctx.beginPath();
      ctx.arc(90, 90, 80, 0, Math.PI*2);
      ctx.fillStyle = '#F97316';
      ctx.fill();
      // Orelhas
      ctx.beginPath();
      ctx.moveTo(40, 45);
      ctx.lineTo(55, 10);
      ctx.lineTo(75, 40);
      ctx.fillStyle = '#F97316';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(140, 45);
      ctx.lineTo(125, 10);
      ctx.lineTo(105, 40);
      ctx.fill();
      // Olhos
      ctx.beginPath();
      ctx.arc(60, 70, 14, 0, Math.PI*2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(120, 70, 14, 0, Math.PI*2);
      ctx.fill();
      // Pupilas
      ctx.beginPath();
      ctx.arc(62, 70, 6, 0, Math.PI*2);
      ctx.fillStyle = '#000';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(118, 70, 6, 0, Math.PI*2);
      ctx.fill();
      // Focinho
      ctx.beginPath();
      ctx.ellipse(90, 100, 16, 12, 0, 0, Math.PI*2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      // Nariz
      ctx.beginPath();
      ctx.ellipse(90, 96, 4, 3, 0, 0, Math.PI*2);
      ctx.fillStyle = '#F97316';
      ctx.fill();
      // Boca
      ctx.beginPath();
      ctx.moveTo(78, 106);
      ctx.quadraticCurveTo(90, 118, 102, 106);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Bigodes
      ctx.beginPath();
      ctx.moveTo(45, 90); ctx.lineTo(15, 82);
      ctx.moveTo(45, 100); ctx.lineTo(15, 100);
      ctx.moveTo(45, 110); ctx.lineTo(15, 118);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(135, 90); ctx.lineTo(165, 82);
      ctx.moveTo(135, 100); ctx.lineTo(165, 100);
      ctx.moveTo(135, 110); ctx.lineTo(165, 118);
      ctx.stroke();
      // Cifrão segurado pelas patas
      ctx.font = 'bold 34px "Plus Jakarta Sans"';
      ctx.fillStyle = '#FBBF24';
      ctx.textAlign = 'center';
      ctx.fillText('$', 90, 150);
      // Patinhas (pequenos arcos sobre o cifrão)
      ctx.beginPath();
      ctx.ellipse(68, 140, 10, 8, 0, 0, Math.PI*2);
      ctx.fillStyle = '#F97316';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(112, 140, 10, 8, 0, 0, Math.PI*2);
      ctx.fill();
      
      const png = canvas.toDataURL('image/png');
      document.getElementById('favicon').href = png;
      document.getElementById('apple-touch-icon').href = png;
    }

    // ========== LOGIN ==========
    function mostrarLogin() {
      document.getElementById('app-container').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      renderizarLogin();
    }
    function renderizarLogin() {
      const perfis = Object.keys(dadosPessoal.perfis);
      const container = document.getElementById('login-perfis');
      const senhaGroup = document.getElementById('login-senha-group');
      const btnEntrar = document.getElementById('btn-entrar');
      const btnNovo = document.getElementById('btn-novo-perfil');
      const msg = document.getElementById('login-msg');
      
      container.innerHTML = perfis.map(nome => `
        <button onclick="selecionarPerfilLogin('${nome}')" class="w-full glass rounded-xl p-3 text-left hover:bg-white/5 transition">
          ${nome}
        </button>
      `).join('');
      
      if (perfis.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-sm">Nenhum perfil criado ainda.</p>';
        btnNovo.textContent = 'Criar meu primeiro perfil';
        msg.classList.remove('hidden');
      } else {
        btnNovo.textContent = '+ Criar novo perfil';
      }
      
      senhaGroup.classList.add('hidden');
      btnEntrar.classList.add('hidden');
      document.getElementById('login-erro').classList.add('hidden');
      window.perfilSelecionadoLogin = null;
    }
    window.selecionarPerfilLogin = function(nome) {
      window.perfilSelecionadoLogin = nome;
      document.getElementById('login-senha-group').classList.remove('hidden');
      document.getElementById('btn-entrar').classList.remove('hidden');
      document.getElementById('login-senha').value = '';
      document.getElementById('login-senha').focus();
      document.getElementById('login-erro').classList.add('hidden');
    };
    window.entrarPerfil = function() {
      const nome = window.perfilSelecionadoLogin;
      const senha = document.getElementById('login-senha').value;
      const perfilData = dadosPessoal.perfis[nome];
      if (!perfilData || perfilData.senha !== senha) {
        document.getElementById('login-erro').classList.remove('hidden');
        return;
      }
      perfilAtivo = nome;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app-container').classList.remove('hidden');
      renderizarApp();
    };
    window.criarPerfilLogin = function() {
      const nome = prompt('Nome do novo perfil:');
      if (!nome || nome.trim() === '') return;
      if (dadosPessoal.perfis[nome]) return alert('Perfil já existe.');
      const senha = prompt('Defina uma senha para este perfil:');
      if (senha === null || senha.trim() === '') return alert('Senha obrigatória.');
      dadosPessoal.perfis[nome] = { contas: [], cartoes: [], transacoes: [], senha: senha.trim() };
      salvarPessoal();
      renderizarLogin();
    };
    window.logout = function() {
      perfilAtivo = null;
      mostrarLogin();
    };

    // ========== SALDO DE CONTA ==========
    function saldoConta(contaId) {
      const p = perfil();
      if (!p) return 0;
      const conta = p.contas.find(c => c.id === contaId);
      if (!conta) return 0;
      let saldo = conta.saldoInicial || 0;
      p.transacoes.forEach(t => {
        if (t.tipo === 'receita' && t.contaId === contaId) saldo += t.valor;
        if (t.tipo === 'despesa' && t.contaId === contaId) saldo -= t.valor;
        if (t.tipo === 'transferencia') {
          if (t.contaId === contaId) saldo -= t.valor;
          if (t.contaDestinoId === contaId) saldo += t.valor;
        }
      });
      return saldo;
    }

    function resumoMensal() {
      let rec = 0, desp = 0;
      perfil()?.transacoes.forEach(t => {
        const d = new Date(t.data);
        if (d.getMonth() === mesRefPessoal && d.getFullYear() === anoRefPessoal) {
          if (t.tipo === 'receita') rec += t.valor;
          else if (t.tipo === 'despesa') desp += t.valor;
        }
      });
      return { receitas: rec, despesas: desp, saldo: rec - desp };
    }

    // ========== RENDER PRINCIPAL ==========
    function renderizarApp() {
      renderPessoal();
      renderCompart();
      switchTab('pessoal');
    }

    window.switchTab = function(tab) {
      document.getElementById('tab-pessoal').classList.toggle('hidden', tab !== 'pessoal');
      document.getElementById('tab-compartilhado').classList.toggle('hidden', tab !== 'compartilhado');
      document.getElementById('btn-pessoal').classList.toggle('tab-active', tab === 'pessoal');
      document.getElementById('btn-pessoal').classList.toggle('text-gray-400', tab !== 'pessoal');
      document.getElementById('btn-compartilhado').classList.toggle('tab-active', tab === 'compartilhado');
      document.getElementById('btn-compartilhado').classList.toggle('text-gray-400', tab !== 'compartilhado');
    };

    window.mudarMes = function(delta) {
      mesRefPessoal += delta;
      if (mesRefPessoal < 0) { mesRefPessoal = 11; anoRefPessoal--; }
      else if (mesRefPessoal > 11) { mesRefPessoal = 0; anoRefPessoal++; }
      renderPessoal();
    };
    window.mudarMesComp = function(delta) {
      mesRefCompart += delta;
      if (mesRefCompart < 0) { mesRefCompart = 11; anoRefCompart--; }
      else if (mesRefCompart > 11) { mesRefCompart = 0; anoRefCompart++; }
      renderCompart();
    };

    function renderPessoal() {
      const p = perfil();
      if (!p) return;
      document.getElementById('mes-referencia-pessoal').textContent = nomeMesAno(mesRefPessoal, anoRefPessoal);
      document.getElementById('mes-atual-pessoal').textContent = nomeMesAno(mesRefPessoal, anoRefPessoal);
      const { receitas, despesas, saldo } = resumoMensal();
      document.getElementById('resumo-receitas-mes').textContent = fmt(receitas);
      document.getElementById('resumo-despesas-mes').textContent = fmt(despesas);
      document.getElementById('resumo-saldo-mes').textContent = fmt(saldo);
      const patrimonio = p.contas.reduce((s, c) => s + saldoConta(c.id), 0);
      document.getElementById('patrimonio-total').textContent = fmt(patrimonio);

      const listaContas = document.getElementById('lista-contas');
      listaContas.innerHTML = p.contas.map((c, i) => `
        <div class="card-premium rounded-2xl p-4 flex justify-between items-center" onclick="abrirExtrato(${i})">
          <div><p class="font-medium">${c.nome}</p><p class="text-xs text-gray-400">${c.tipo}</p></div>
          <div class="flex items-center gap-3">
            <span class="font-semibold text-amber-400">${fmt(saldoConta(c.id))}</span>
            <button onclick="event.stopPropagation(); openModal('conta', ${i})" class="text-gray-400 text-xs">✎</button>
            <button onclick="event.stopPropagation(); excluirConta(${i})" class="text-red-400 text-xs">✕</button>
          </div>
        </div>
      `).join('') || '<p class="text-gray-500 text-center py-4">Nenhuma conta</p>';

      const listaCartoes = document.getElementById('lista-cartoes');
      listaCartoes.innerHTML = p.cartoes.map((c, i) => {
        const pct = c.limite > 0 ? (c.utilizado / c.limite * 100) : 0;
        const cor = pct > 80 ? 'bg-red-500' : pct > 50 ? 'bg-yellow-500' : 'bg-emerald-500';
        return `
          <div class="card-premium rounded-2xl p-4">
            <div class="flex justify-between"><div><p class="font-medium">${c.nome}</p><p class="text-xs text-gray-400">Fecha ${c.fechamento?dt(c.fechamento):'n/d'}</p></div>
            <div class="flex gap-2"><button onclick="openModal('cartao', ${i})" class="text-gray-400 text-xs">✎</button><button onclick="excluirCartao(${i})" class="text-red-400 text-xs">✕</button></div></div>
            <div class="flex justify-between text-sm mb-2"><span>Utilizado: <strong class="text-amber-400">${fmt(c.utilizado)}</strong></span><span>Limite: ${fmt(c.limite)}</span></div>
            <div class="progress-bar"><div class="progress-fill ${cor}" style="width:${Math.min(pct,100)}%"></div></div>
            ${c.obs ? `<p class="text-xs text-gray-500 mt-2">📌 ${c.obs}</p>` : ''}
          </div>`;
      }).join('') || '<p class="text-gray-500 text-center py-4">Nenhum cartão</p>';

      // Últimas 10 transações gerais
      const transacoesGeral = p.transacoes.filter(t => {
        const d = new Date(t.data);
        return d.getMonth() === mesRefPessoal && d.getFullYear() === anoRefPessoal;
      }).sort((a,b) => new Date(b.data) - new Date(a.data)).slice(0, 10);
      const listaTransacoes = document.getElementById('lista-transacoes');
      listaTransacoes.innerHTML = transacoesGeral.map(t => {
        const sinal = t.tipo === 'receita' ? '+' : t.tipo === 'despesa' ? '-' : '↔';
        const cor = t.tipo === 'receita' ? 'text-green-400' : t.tipo === 'despesa' ? 'text-red-400' : 'text-blue-400';
        const contaNome = p.contas.find(c => c.id === t.contaId)?.nome || '';
        const detalhe = t.tipo === 'transferencia' ? `${contaNome} → ${p.contas.find(c => c.id === t.contaDestinoId)?.nome || ''}` : contaNome;
        return `
          <div class="card-premium rounded-xl p-3 flex justify-between items-center text-sm">
            <div><p class="font-medium">${t.descricao}</p><p class="text-xs text-gray-500">${dt(t.data)} • ${detalhe}</p></div>
            <div class="flex items-center gap-2"><span class="font-semibold ${cor}">${sinal} ${fmt(t.valor)}</span></div>
          </div>`;
      }).join('') || '<p class="text-gray-500 text-center py-2">Nenhuma transação</p>';
    }

    function renderCompart() {
      document.getElementById('mes-referencia-compart').textContent = nomeMesAno(mesRefCompart, anoRefCompart);
      document.getElementById('mes-atual-compart').textContent = nomeMesAno(mesRefCompart, anoRefCompart);
      const totaisPessoa = {};
      dadosCompart.pessoas.forEach(p => totaisPessoa[p.nome] = 0);
      dadosCompart.contas.forEach(conta => {
        const incluir = conta.recorrente || (conta.vencimento && new Date(conta.vencimento).getMonth() === mesRefCompart && new Date(conta.vencimento).getFullYear() === anoRefCompart);
        if (incluir) {
          conta.participantes.forEach(p => {
            const pessoa = dadosCompart.pessoas[p.pessoaIdx];
            if (pessoa) totaisPessoa[pessoa.nome] = (totaisPessoa[pessoa.nome] || 0) + p.valor;
          });
        }
      });

      const listaPessoas = document.getElementById('lista-pessoas');
      listaPessoas.innerHTML = dadosCompart.pessoas.map((p, i) => `
        <div class="card-premium rounded-xl p-3 flex justify-between items-center">
          <div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-400 font-bold text-xs">${p.nome.charAt(0)}</div><div><span class="font-medium">${p.nome}</span><p class="text-xs text-gray-400">Salário: ${fmt(p.salario)}</p></div></div>
          <div class="flex items-center gap-3"><div class="text-right"><span class="text-amber-400 font-semibold text-sm">Devido:</span><p class="text-white font-bold">${fmt(totaisPessoa[p.nome] || 0)}</p></div><button onclick="openModal('pessoa', ${i})" class="text-gray-400 text-xs">✎</button><button onclick="excluirPessoa(${i})" class="text-red-400 text-xs">✕</button></div>
        </div>
      `).join('') || '<p class="text-gray-500 text-center py-4">Nenhuma pessoa</p>';

      const contasFiltradas = dadosCompart.contas.filter(c => c.recorrente || (c.vencimento && new Date(c.vencimento).getMonth() === mesRefCompart && new Date(c.vencimento).getFullYear() === anoRefCompart));
      const listaContasCompart = document.getElementById('lista-contas-compartilhadas');
      listaContasCompart.innerHTML = contasFiltradas.map((c, i) => {
        const detalhes = c.participantes.map(p => `<div class="flex justify-between text-xs"><span>${dadosCompart.pessoas[p.pessoaIdx]?.nome||'?'}</span><span class="text-amber-400">${fmt(p.valor)}</span></div>`).join('');
        const badge = c.recorrente ? `<span class="badge-recorrente">🔄 ${c.frequencia}</span>` : '';
        const atrasado = c.vencimento && c.vencimento < hoje.toISOString().slice(0,10);
        return `
          <div class="card-premium rounded-2xl p-4 ${atrasado ? 'vencimento-proximo' : ''}">
            <div class="flex justify-between"><div><div class="flex items-center gap-2"><p class="font-medium">${c.descricao}</p>${badge}</div><p class="text-xs text-gray-400">Venc: ${c.vencimento ? dt(c.vencimento) : '—'} ${atrasado?'⚠️':''}</p></div>
            <div class="flex gap-2"><button onclick="openModal('conta-compartilhada', ${dadosCompart.contas.indexOf(c)})" class="text-gray-400 text-xs">✎</button><button onclick="excluirContaCompart(${dadosCompart.contas.indexOf(c)})" class="text-red-400 text-xs">✕</button></div></div>
            <p class="text-2xl font-bold text-amber-400 mt-2">${fmt(c.valor)}</p>
            <div class="mt-3 space-y-1">${detalhes}</div>
          </div>`;
      }).join('') || '<p class="text-gray-500 text-center py-4">Nenhuma conta</p>';

      const resumoDiv = document.getElementById('resumo-mensal-compart');
      resumoDiv.innerHTML = Object.entries(totaisPessoa).filter(([_,v])=>v>0).map(([nome,valor])=>`<div class="flex justify-between"><span>${nome}</span><span class="font-semibold">${fmt(valor)}</span></div>`).join('') || '<p class="text-gray-500">Nenhum débito</p>';
    }

    // ========== EXTRATO POR CONTA ==========
    window.abrirExtrato = function(idx) {
      const conta = perfil()?.contas[idx];
      if (!conta) return;
      const transacoes = perfil().transacoes.filter(t => t.contaId === conta.id || t.contaDestinoId === conta.id);
      const modal = document.getElementById('modal');
      const content = document.getElementById('modal-content');
      modal.classList.remove('hidden');
      content.innerHTML = `
        <h3 class="text-lg font-semibold mb-3">${conta.nome} <span class="text-sm font-normal text-gray-400">(${fmt(saldoConta(conta.id))})</span></h3>
        <div class="max-h-60 overflow-y-auto mb-4 space-y-2">
          ${transacoes.sort((a,b) => new Date(b.data)-new Date(a.data)).map(t => {
            const sinal = t.tipo === 'receita' ? '+' : t.tipo === 'despesa' ? '-' : t.tipo === 'transferencia' && t.contaDestinoId === conta.id ? '+' : '-';
            const cor = sinal === '+' ? 'text-green-400' : 'text-red-400';
            return `<div class="flex justify-between text-sm"><span>${t.descricao} (${dt(t.data)})</span><span class="${cor}">${sinal} ${fmt(t.valor)}</span></div>`;
          }).join('') || '<p class="text-gray-500 text-center">Sem movimentações</p>'}
        </div>
        <button onclick="closeModal(); openModal('transacao', null, ${conta.id})" class="w-full bg-amber-500 text-black font-semibold py-2 rounded-xl text-sm">+ Nova transação nesta conta</button>
      `;
    };

    // ========== MODAL (ajustado) ==========
    window.openModal = function(tipo, editIndex = null, contaPreSelecionada = null) {
      const modal = document.getElementById('modal');
      const content = document.getElementById('modal-content');
      modal.classList.remove('hidden');
      if (tipo === 'conta') formConta(content, editIndex);
      else if (tipo === 'cartao') formCartao(content, editIndex);
      else if (tipo === 'pessoa') formPessoa(content, editIndex);
      else if (tipo === 'conta-compartilhada') formContaCompart(content, editIndex);
      else if (tipo === 'transacao') formTransacao(content, editIndex, contaPreSelecionada);
    };
    window.closeModal = function() { document.getElementById('modal').classList.add('hidden'); };

    function formConta(container, idx) {
      const p = perfil();
      const c = idx !== null ? p.contas[idx] : { id: Date.now(), nome:'', tipo:'corrente', saldoInicial:0 };
      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-3">${idx!==null?'Editar':'Nova'} Conta</h3>
        <input id="c-nome" placeholder="Nome" value="${c.nome}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <select id="c-tipo" class="w-full p-2 rounded-xl mb-2 text-sm">
          <option value="corrente" ${c.tipo==='corrente'?'selected':''}>Corrente</option>
          <option value="poupanca" ${c.tipo==='poupanca'?'selected':''}>Poupança</option>
          <option value="carteira" ${c.tipo==='carteira'?'selected':''}>Carteira</option>
        </select>
        <input id="c-saldo-inicial" type="number" step="0.01" placeholder="Saldo inicial" value="${c.saldoInicial||0}" class="w-full p-2 rounded-xl mb-3 text-sm">
        <button onclick="salvarConta(${idx!==null?idx:-1}, ${c.id})" class="w-full bg-amber-500 text-black font-semibold py-2 rounded-xl text-sm">Salvar</button>
      `;
    }
    window.salvarConta = function(idx, id) {
      const p = perfil();
      const nome = document.getElementById('c-nome').value.trim();
      const tipo = document.getElementById('c-tipo').value;
      const saldoInicial = parseFloat(document.getElementById('c-saldo-inicial').value)||0;
      if (!nome) return alert('Preencha o nome');
      const obj = { id, nome, tipo, saldoInicial };
      if (idx === -1) p.contas.push(obj);
      else p.contas[idx] = obj;
      salvarPessoal(); closeModal(); renderPessoal();
    };

    function formCartao(container, idx) {
      const p = perfil();
      const c = idx !== null ? p.cartoes[idx] : { nome:'', limite:0, utilizado:0, fechamento:'', obs:'' };
      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-3">${idx!==null?'Editar':'Novo'} Cartão</h3>
        <input id="cart-nome" placeholder="Nome" value="${c.nome}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <input id="cart-limite" type="number" step="0.01" placeholder="Limite" value="${c.limite}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <input id="cart-utilizado" type="number" step="0.01" placeholder="Fatura atual" value="${c.utilizado}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <label class="text-xs text-gray-400">Fechamento</label>
        <input id="cart-fechamento" type="date" value="${c.fechamento}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <textarea id="cart-obs" rows="2" placeholder="Obs" class="w-full p-2 rounded-xl mb-3 text-sm">${c.obs||''}</textarea>
        <button onclick="salvarCartao(${idx!==null?idx:-1})" class="w-full bg-amber-500 text-black font-semibold py-2 rounded-xl text-sm">Salvar</button>
      `;
    }
    window.salvarCartao = function(idx) {
      const p = perfil();
      const nome = document.getElementById('cart-nome').value.trim();
      const limite = parseFloat(document.getElementById('cart-limite').value)||0;
      const utilizado = parseFloat(document.getElementById('cart-utilizado').value)||0;
      const fechamento = document.getElementById('cart-fechamento').value;
      const obs = document.getElementById('cart-obs').value;
      if (!nome) return alert('Preencha o nome');
      const obj = { nome, limite, utilizado, fechamento, obs };
      if (idx === -1) p.cartoes.push(obj);
      else p.cartoes[idx] = obj;
      salvarPessoal(); closeModal(); renderPessoal();
    };

    function formTransacao(container, idx, contaPreSelecionada) {
      const p = perfil();
      const t = idx !== null ? p.transacoes[idx] : { id: Date.now(), descricao:'', valor:0, tipo:'despesa', contaId: contaPreSelecionada || null, contaDestinoId:null, data: hoje.toISOString().slice(0,10) };
      const contasOpt = p.contas.map(c => `<option value="${c.id}" ${t.contaId===c.id?'selected':''}>${c.nome}</option>`).join('');
      const destOpt = p.contas.map(c => `<option value="${c.id}" ${t.contaDestinoId===c.id?'selected':''}>${c.nome}</option>`).join('');
      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-3">${idx!==null?'Editar':'Nova'} Transação</h3>
        <input id="t-desc" placeholder="Descrição" value="${t.descricao}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <input id="t-valor" type="number" step="0.01" placeholder="Valor" value="${t.valor}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <select id="t-tipo" class="w-full p-2 rounded-xl mb-2 text-sm" onchange="transacaoTipoChange()">
          <option value="despesa" ${t.tipo==='despesa'?'selected':''}>Despesa</option>
          <option value="receita" ${t.tipo==='receita'?'selected':''}>Receita</option>
          <option value="transferencia" ${t.tipo==='transferencia'?'selected':''}>Transferência</option>
        </select>
        <select id="t-conta" class="w-full p-2 rounded-xl mb-2 text-sm">${contasOpt}</select>
        <div id="t-conta-destino-group" class="mb-2 ${t.tipo==='transferencia'?'':'hidden'}">
          <select id="t-conta-destino" class="w-full p-2 rounded-xl text-sm">${destOpt}</select>
        </div>
        <input id="t-data" type="date" value="${t.data}" class="w-full p-2 rounded-xl mb-3 text-sm">
        <button onclick="salvarTransacao(${idx!==null?idx:-1}, ${t.id})" class="w-full bg-amber-500 text-black font-semibold py-2 rounded-xl text-sm">Salvar</button>
      `;
    }
    window.transacaoTipoChange = function() {
      const tipo = document.getElementById('t-tipo').value;
      document.getElementById('t-conta-destino-group').classList.toggle('hidden', tipo !== 'transferencia');
    };
    window.salvarTransacao = function(idx, id) {
      const p = perfil();
      const desc = document.getElementById('t-desc').value.trim();
      const valor = parseFloat(document.getElementById('t-valor').value)||0;
      const tipo = document.getElementById('t-tipo').value;
      const contaId = parseInt(document.getElementById('t-conta').value) || null;
      const contaDestinoId = tipo === 'transferencia' ? (parseInt(document.getElementById('t-conta-destino').value) || null) : null;
      const data = document.getElementById('t-data').value;
      if (!desc || !contaId) return alert('Preencha os campos');
      const obj = { id, descricao: desc, valor, tipo, contaId, contaDestinoId, data };
      if (idx === -1) p.transacoes.push(obj);
      else p.transacoes[idx] = obj;
      salvarPessoal(); closeModal(); renderPessoal();
    };

    function formPessoa(container, idx) {
      const p = idx !== null ? dadosCompart.pessoas[idx] : { nome:'', salario:0 };
      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-3">${idx!==null?'Editar':'Nova'} Pessoa</h3>
        <input id="p-nome" placeholder="Nome" value="${p.nome}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <input id="p-salario" type="number" step="0.01" placeholder="Salário" value="${p.salario}" class="w-full p-2 rounded-xl mb-3 text-sm">
        <button onclick="salvarPessoa(${idx!==null?idx:-1})" class="w-full bg-amber-500 text-black font-semibold py-2 rounded-xl text-sm">Salvar</button>
      `;
    }
    window.salvarPessoa = function(idx) {
      const nome = document.getElementById('p-nome').value.trim();
      const salario = parseFloat(document.getElementById('p-salario').value)||0;
      if (!nome) return alert('Preencha');
      const obj = { nome, salario };
      if (idx === -1) dadosCompart.pessoas.push(obj);
      else dadosCompart.pessoas[idx] = obj;
      salvarCompart(); closeModal(); renderCompart();
    };

    function formContaCompart(container, idx) {
      const conta = idx !== null ? dadosCompart.contas[idx] : null;
      const desc = conta ? conta.descricao : '';
      const valor = conta ? conta.valor : '';
      const vencimento = conta ? conta.vencimento : '';
      const recorrente = conta ? conta.recorrente : false;
      const frequencia = conta ? conta.frequencia : 'mensal';
      let checksHTML = '';
      dadosCompart.pessoas.forEach((p, i) => {
        const marcado = conta ? conta.participantes.some(pt => pt.pessoaIdx === i) : true;
        checksHTML += `<label class="flex items-center gap-2 mb-1 text-sm"><input type="checkbox" class="pessoa-check" value="${i}" ${marcado?'checked':''}> ${p.nome}</label>`;
      });
      container.innerHTML = `
        <h3 class="text-lg font-semibold mb-3">${idx!==null?'Editar':'Nova'} Conta</h3>
        <input id="cc-desc" placeholder="Descrição" value="${desc}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <input id="cc-valor" type="number" step="0.01" placeholder="Valor total" value="${valor}" class="w-full p-2 rounded-xl mb-2 text-sm" oninput="calcularDivisaoAuto()">
        <label class="text-xs text-gray-400">Vencimento</label>
        <input id="cc-vencimento" type="date" value="${vencimento}" class="w-full p-2 rounded-xl mb-2 text-sm">
        <div class="flex items-center gap-2 mb-2"><input type="checkbox" id="cc-recorrente" ${recorrente?'checked':''}> <span class="text-sm">Recorrente</span></div>
        <div id="cc-freq-group" class="mb-2 ${recorrente?'':'hidden'}">
          <select id="cc-frequencia" class="w-full p-2 rounded-xl text-sm">
            <option value="semanal" ${frequencia==='semanal'?'selected':''}>Semanal</option>
            <option value="quinzenal" ${frequencia==='quinzenal'?'selected':''}>Quinzenal</option>
            <option value="mensal" ${frequencia==='mensal'?'selected':''}>Mensal</option>
          </select>
        </div>
        <div class="text-sm mb-1">Participantes:</div>
        <div id="cc-participantes" class="mb-2" onchange="calcularDivisaoAuto()">${checksHTML}</div>
        <div id="cc-valores-individuais" class="space-y-2 mb-3"></div>
        <button onclick="salvarContaCompart(${idx!==null?idx:-1})" class="w-full bg-amber-500 text-black font-semibold py-2 rounded-xl text-sm">Salvar</button>
      `;
      document.getElementById('cc-recorrente').addEventListener('change', function() {
        document.getElementById('cc-freq-group').classList.toggle('hidden', !this.checked);
      });
      if (conta) {
        setTimeout(() => {
          conta.participantes.forEach(p => {
            const check = document.querySelector(`.pessoa-check[value="${p.pessoaIdx}"]`);
            if (check) check.checked = true;
          });
          atualizarCamposIndividuais(conta.participantes);
        }, 10);
      } else {
        calcularDivisaoAuto();
      }
    }
    window.calcularDivisaoAuto = function() {
      const checks = document.querySelectorAll('.pessoa-check:checked');
      const valorTotal = parseFloat(document.getElementById('cc-valor').value)||0;
      if (checks.length === 0 || valorTotal <= 0) {
        const cont = document.getElementById('cc-valores-individuais');
        if (cont) cont.innerHTML = '';
        return;
      }
      let soma = 0;
      const selec = [];
      checks.forEach(cb => {
        const idx = parseInt(cb.value);
        const pessoa = dadosCompart.pessoas[idx];
        if (pessoa) { selec.push({ idx, salario: pessoa.salario }); soma += pessoa.salario; }
      });
      const valores = selec.map(s => ({ pessoaIdx: s.idx, valor: soma > 0 ? (s.salario / soma) * valorTotal : 0 }));
      atualizarCamposIndividuais(valores);
    };
    function atualizarCamposIndividuais(vals) {
      const cont = document.getElementById('cc-valores-individuais');
      if (!cont) return;
      cont.innerHTML = vals.map(v => `
        <div class="flex items-center gap-2">
          <span class="text-xs w-24">${dadosCompart.pessoas[v.pessoaIdx]?.nome||''}</span>
          <input type="number" step="0.01" value="${v.valor.toFixed(2)}" data-pessoa="${v.pessoaIdx}" class="valor-individual w-full p-2 rounded-lg text-sm">
        </div>
      `).join('');
    }
    window.salvarContaCompart = function(idx) {
      const desc = document.getElementById('cc-desc').value.trim();
      const valor = parseFloat(document.getElementById('cc-valor').value)||0;
      const vencimento = document.getElementById('cc-vencimento').value;
      const recorrente = document.getElementById('cc-recorrente').checked;
      const frequencia = recorrente ? document.getElementById('cc-frequencia').value : null;
      if (!desc) return alert('Descrição obrigatória');
      const participantes = [];
      document.querySelectorAll('.valor-individual').forEach(inp => {
        const pessoaIdx = parseInt(inp.dataset.pessoa);
        const val = parseFloat(inp.value)||0;
        participantes.push({ pessoaIdx, valor: val });
      });
      const obj = { descricao: desc, valor, vencimento, recorrente, frequencia, participantes };
      if (idx === -1) dadosCompart.contas.push(obj);
      else dadosCompart.contas[idx] = obj;
      salvarCompart(); closeModal(); renderCompart();
    };

    // Exclusões
    window.excluirConta = (i) => { if(confirm('Excluir conta e transações?')) { const p = perfil(); const id = p.contas[i].id; p.contas.splice(i,1); p.transacoes = p.transacoes.filter(t => t.contaId !== id && t.contaDestinoId !== id); salvarPessoal(); renderPessoal(); } };
    window.excluirCartao = (i) => { if(confirm('Excluir cartão?')) { perfil().cartoes.splice(i,1); salvarPessoal(); renderPessoal(); } };
    window.excluirPessoa = (i) => { if(confirm('Excluir pessoa?')) { dadosCompart.pessoas.splice(i,1); salvarCompart(); renderCompart(); } };
    window.excluirContaCompart = (i) => { if(confirm('Excluir conta?')) { dadosCompart.contas.splice(i,1); salvarCompart(); renderCompart(); } };

    // Inicialização
    carregarDados();
    gerarIcone();
    mostrarLogin();
  })();
</script>
</body>
</html>
